name: Release Desktop App

on:
  push:
    branches: [main]
    paths-ignore:
      # Prevent infinite loops from the version-bump commit
      - '.github/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Bump the patch version across all version files and commit back.
  # -----------------------------------------------------------------------
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        id: bump
        run: |
          # Read current version from tauri.conf.json (source of truth)
          CURRENT=$(jq -r '.version' src-tauri/tauri.conf.json)
          echo "Current version: $CURRENT"

          # Split into parts and increment patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          echo "New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          # --- Update tauri.conf.json ---
          jq --arg v "$NEW_VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json
          mv tmp.json src-tauri/tauri.conf.json

          # --- Update package.json ---
          jq --arg v "$NEW_VERSION" '.version = $v' package.json > tmp.json
          mv tmp.json package.json

          # --- Update Cargo.toml (first [package] version only) ---
          sed -i "0,/^version = \".*\"/s/^version = \".*\"/version = \"$NEW_VERSION\"/" src-tauri/Cargo.toml

      - name: Commit version bump
        run: |
          git add src-tauri/tauri.conf.json package.json src-tauri/Cargo.toml
          git diff --staged --quiet || git commit -m "chore: bump version to v${{ steps.bump.outputs.new_version }} [skip ci]"
          git push

  # -----------------------------------------------------------------------
  # Job 2: Build and publish the Tauri release for macOS (arm64 + x86_64).
  # -----------------------------------------------------------------------
  release:
    needs: bump-version
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin   # Apple Silicon
          - platform: macos-latest
            args: --target x86_64-apple-darwin    # Intel Mac

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          # Pull the version-bump commit that job 1 just pushed
          ref: main

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install npm dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          TAURI_BUILD: "true"
        with:
          tagName: v__VERSION__
          releaseName: Tension v__VERSION__
          releaseBody: |
            ## What's new
            See commit history for details.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          includeUpdaterJson: true
